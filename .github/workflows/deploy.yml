name: Build and Deploy to App Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: kml-server
  APP_RUNNER_SERVICE: kml-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create or update App Runner service
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          RT_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          RT_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          RT_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RT_GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          RT_ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
          RT_S3_BUCKET: ${{ secrets.S3_BUCKET }}
          RT_S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='${APP_RUNNER_SERVICE}'].ServiceArn" --output text)
          IMAGE_CONFIG=$(cat <<ENDJSON
          {
            "AuthenticationConfiguration": {
              "AccessRoleArn": "arn:aws:iam::579871531410:role/kml-apprunner-ecr-access"
            },
            "ImageRepository": {
              "ImageIdentifier": "${IMAGE_URI}",
              "ImageRepositoryType": "ECR",
              "ImageConfiguration": {
                "Port": "8080",
                "RuntimeEnvironmentVariables": {
                  "AWS_ACCESS_KEY_ID": "${RT_AWS_ACCESS_KEY_ID}",
                  "AWS_SECRET_ACCESS_KEY": "${RT_AWS_SECRET_ACCESS_KEY}",
                  "AWS_DEFAULT_REGION": "eu-west-3",
                  "ANTHROPIC_API_KEY": "${RT_ANTHROPIC_API_KEY}",
                  "GOOGLE_API_KEY": "${RT_GOOGLE_API_KEY}",
                  "ORS_API_KEY": "${RT_ORS_API_KEY}",
                  "S3_BUCKET": "${RT_S3_BUCKET}",
                  "S3_REGION": "${RT_S3_REGION}"
                }
              }
            },
            "AutoDeploymentsEnabled": false
          }
          ENDJSON
          )
          if [ -z "$SERVICE_ARN" ]; then
            echo "Creating new App Runner service..."
            aws apprunner create-service \
              --service-name $APP_RUNNER_SERVICE \
              --source-configuration "$IMAGE_CONFIG" \
              --instance-configuration '{"Cpu": "0.25 vCPU", "Memory": "0.5 GB"}'
          else
            echo "Updating existing App Runner service..."
            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration "$IMAGE_CONFIG"
          fi
