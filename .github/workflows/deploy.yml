name: Build and Deploy to App Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: kml-server
  APP_RUNNER_SERVICE: kml-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create or update App Runner service
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='${APP_RUNNER_SERVICE}'].ServiceArn" --output text)
          if [ -z "$SERVICE_ARN" ]; then
            echo "Creating new App Runner service..."
            aws apprunner create-service \
              --service-name $APP_RUNNER_SERVICE \
              --source-configuration '{
                "AuthenticationConfiguration": {
                  "AccessRoleArn": "arn:aws:iam::579871531410:role/kml-apprunner-ecr-access"
                },
                "ImageRepository": {
                  "ImageIdentifier": "'"$IMAGE_URI"'",
                  "ImageRepositoryType": "ECR",
                  "ImageConfiguration": {
                    "Port": "8080"
                  }
                },
                "AutoDeploymentsEnabled": false
              }' \
              --instance-configuration '{
                "Cpu": "0.25 vCPU",
                "Memory": "0.5 GB"
              }'
          else
            echo "Updating existing App Runner service..."
            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration '{
                "AuthenticationConfiguration": {
                  "AccessRoleArn": "arn:aws:iam::579871531410:role/kml-apprunner-ecr-access"
                },
                "ImageRepository": {
                  "ImageIdentifier": "'"$IMAGE_URI"'",
                  "ImageRepositoryType": "ECR",
                  "ImageConfiguration": {
                    "Port": "8080"
                  }
                },
                "AutoDeploymentsEnabled": false
              }'
          fi
